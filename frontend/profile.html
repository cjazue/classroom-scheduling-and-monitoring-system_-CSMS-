<html>
  <link rel="stylesheet" href="/assets/css/test.css">
<div id="profile"></div>

<script>
const user = {
  name: "Juan Dela Cruz",
  role: "President",
  vits_position: "President"
};

function getFlair(user) {
  if (user.role === "Admin") {
    return `<span class="flair admin">Admin</span>`;
  } 
  if (user.vits_position === "President") {
    return `<span class="flair president">President</span>`;
  }
  return `<span class="flair member">Member</span>`;
}

document.getElementById("profile").innerHTML = `
  <h2>${user.name}</h2>
  ${getFlair(user)}
`;
</script>
</html>
