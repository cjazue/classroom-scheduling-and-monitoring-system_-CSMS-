<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/ASSETS/logo.png" type="image/png" />
  <title>CSMS Student View</title>
  <link rel="stylesheet" href="/static/css/user/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

</head>
<body>
  <div class="page-shell">
    <div class="menu">
      <input type="checkbox" id="menu"/>

      <div class="logo">
          CSMS
        <label for="menu"></label>
      </div>

        <div class="items">
          <a href="#" class="item"><img src="../ASSETS/home.jpg" alt="Home Icon" class="nav-icon">Home</a>
          <a href="about us.html" class="item"><img src="../ASSETS/info.jpg" alt="Home Icon" class="nav-icon">About</a>
          <a href="homepage.html" class="item">Log out</a>
        </div>

    </div>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
              <a href="profile2.html">
                <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
              </a>
            <span>Profile</span>
          </div>

          <div class="sidebar-card sidebar-card--light">
                <i class="fa-solid fa-table-cells-large" style="font-size: 40px; color: white;"></i>
            <span>Dashboard</span>
          </div>
        </div>
        <a href="loginpage.html">
        <button class="logout-btn" type="button">Log out</button>
        </a>
      </aside>

      <main class="content">
        <section class="title-row">
          <h1>Student View</h1>
          <div class="title-line" aria-hidden="true"></div>
        </section>

        <section class="stats-row">
          <a href="occupied.html">
          <article class="stat-card stat-card-muted">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Occupied Rooms</p>
              <strong id="statOccupiedRooms">0</strong>
            </div>
          </article>
          </a>


          <a href="available.html">
          <article class="stat-card">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Available Rooms</p> 
              <strong id="statAvailableRooms">0</strong>
            </div>
          </article>
          </a>

          <article class="stat-card stat-card-bright">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Total Rooms</p>
              <strong id="statTotalRooms">0</strong>
            </div>
          </article>
        </section>

        <div class="panel">
          <div class="panel-top">
            <div class="panel-badge">Dashboard</div>  
          </div>
            <div class="text">
              <a href="occupied.html">Occupied Rooms</a>
              <a href="available.html">Available Rooms</a>
            </div>
        </div>
      </main>
    </div>
  </div>
  <script>
    (function () {
      'use strict';

      function fmt2(n) {
        return String(n).padStart(2, '0');
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = value == null ? '—' : String(value);
      }

      async function loadRoomStats() {
        if (!window.CSMS || !window.CSMS.api || typeof window.CSMS.api.request !== 'function') return;

        const today = new Date();
        const iso = `${today.getFullYear()}-${fmt2(today.getMonth() + 1)}-${fmt2(today.getDate())}`;

        // Keep consistent with the default window used in Available/Occupied pages.
        const start = '07:00';
        const end = '21:00';

        try {
          const [totalResp, availResp] = await Promise.all([
            window.CSMS.api.request('/api/rooms?is_active=true&per_page=1', { method: 'GET' }),
            window.CSMS.api.request(
              `/api/rooms?is_active=true&per_page=1&available_on=${encodeURIComponent(iso)}` +
                `&available_from=${encodeURIComponent(start)}&available_until=${encodeURIComponent(end)}`,
              { method: 'GET' }
            ),
          ]);

          const total = totalResp && totalResp.data && totalResp.data.pagination ? totalResp.data.pagination.total : null;
          const available = availResp && availResp.data && availResp.data.pagination ? availResp.data.pagination.total : null;

          if (typeof total === 'number') setText('statTotalRooms', total);
          if (typeof available === 'number') setText('statAvailableRooms', available);
          if (typeof total === 'number' && typeof available === 'number') setText('statOccupiedRooms', Math.max(0, total - available));
        } catch {
          // Non-fatal.
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        loadRoomStats();
        setInterval(loadRoomStats, 30000);
      });
    })();
  </script>
  <script src="/static/js/user/calendar.js"></script>
</body>
</html>
