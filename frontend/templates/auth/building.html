<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/ASSETS/logo.png" type="image/png" />
  <title>PLV Reservation</title>
  <link rel="stylesheet" href="/static/css/auth/building.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="menu">
      <input type="checkbox" id="menu" />

      <div class="logo">
        CSMS
      <label for="menu"></label>
      </div>

        <div class="items">
          <a href="#" class="item"><img src="../ASSETS/home.jpg" alt="Home Icon" class="nav-icon">Home</a>
          <a href="campus.html" class="item"><img src="../ASSETS/clip.jpg" alt="Home Icon" class="nav-icon">Reservation</a>
          <a href="about us.html" class="item"><img src="../ASSETS/info.jpg" alt="Home Icon" class="nav-icon">About</a>
          <a href="homepage.html" class="item"><img src="../ASSETS/info.jpg" alt="Home Icon" class="nav-icon">Logout</a>
        </div>

    </div>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
              <a href="profile2.html">
                <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
              </a>
            <span>Profile</span>
          </div>

          <div class="sidebar-card sidebar-card--light">
              <a href="dashboard.html">
                <i class="fa-solid fa-table-cells-large" style="font-size: 50px; color: #043AA3;"></i>
              </a>
            <span>Dashboard</span>
          </div>

          <div class="sidebar-card sidebar-card--selected">
              <a href="campus.html">
                <i class="fa-regular fa-building" style="font-size: 60px; color: #ffffff;"></i>
              </a>
            <span>Campus</span>
          </div>
        </div>
        <a href="homepage.html">
        <button class="logout-btn" type="button">Log out</button>
        </a>
      </aside>

      <main class="content">
        <section class="hero-row">
          <div class="hero-copy">
            <h1>
              <span class="accent">Schedule</span> 
              <span class="your">your</span>
              <span class="accent">Room</span>
            </h1>
          </div>
          
          <div class="hero-actions">
            <div><a href="dashboard.html"><button class="ghost-btn" type="button">My Room</button></a></div>

            <button class="solid-btn" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M12 8v8"></path>
                <path d="M8 12h8"></path>
              </svg>
              <a href="campus.html"><span>Reserved Room</span></a>
            </button>
          </div>
        </section>
        <div class="section-link">
            <a href="campus.html">All campus</a>
            <a href="#">Buildings</a>
        </div>
        <section class="schedule-panel">

          <div class="cur-building">
              Annex Campus
          </div>
            <div class="campus-grid">
                  <article class="campus-card">
                    
                    <div class="campus-image-holder">
                      <a href="room.html"><img class="campus-image" src="../ASSETS/cas.jpg" alt="CAS Campus">
                    </div>
                    <h2>College of Arts and Science</h2>
                    </a>
                  </article>

                  <article class="campus-card">
                    <div class="campus-image-holder">
                      <img class="campus-image" src="../ASSETS/nb.jpg" alt="NB Campus">
                    </div>
                    <h2>New Building</h2>
                  </article>

                  <article class="campus-card">
                    <div class="campus-image-holder">
                      <img class="campus-image" src="../ASSETS/admin.jpg" alt="ADMIN Campus">
                    </div>
                    <h2>Administration Building</h2>
                  </article>
            </div>
        </section>
      </main>
    </div>
  </div>

</html>
