<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/ASSETS/logo.png" type="image/png" />
  <title>CSMS Super Admin</title>
  <link rel="stylesheet" href="/static/css/superadmin/Create_Admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-shell">

    <!-- TOP NAV -->
    <div class="menu">
      <input type="checkbox" id="menu"/>
      <div class="logo">
        CSMS
        <label for="menu"></label>
      </div>
        <div class="items">
          <a href="Super Admin.html" class="item"><img src="../ASSETS/home.jpg" alt="Home Icon" class="nav-icon">Home</a>
          <a href="aboutus.html" class="item"><img src="../ASSETS/info.jpg" alt="Home Icon" class="nav-icon">About</a>
          <a href="/auth/homepage.html" class="item">Logout</a>
        </div>
    </div>

    <div class="dashboard-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
            <a href="profile2.html">
              <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
            </a>
            <span>Profile</span>
          </div>
          <div class="sidebar-card sidebar-card--light">
            <i class="fa-solid fa-table-cells-large" style="font-size: 50px; color: white;"></i>
            <span>Dashboard</span>
          </div>

          <div class="sidebar-section" aria-label="Import navigation">
            <div class="sidebar-section-title">Import</div>
            <a class="sidebar-link" href="Imports.html#import-students">Import Students</a>
            <a class="sidebar-link" href="Imports.html#import-schedules">Import Schedules</a>
            <a class="sidebar-link" href="Schedules.html">View Schedules</a>
            <a class="sidebar-link" href="Users.html">View Overall Users</a>
          </div>
        </div>
        <a href="/auth/homepage.html">
          <button class="logout-btn" type="button">Log out</button>
        </a>
      </aside>

      <!-- MAIN -->
      <main class="content">

        <!-- Page Title -->
        <section class="title-row">
          <h1>Super Admin</h1>
          <div class="title-line"></div>
        </section>

        <!-- Stat Cards -->
        <section class="stats-row">
          <div class="stat-card stat-card--blue">
            <span class="stat-bar"></span>
            <a href="Super Admin.html">
              <div class="stat-copy">
                <p>Manage Admin</p>
                <img src="../ASSETS/cog.svg" alt="Manage Admin">
              </div>
            </a>
          </div>
          <div class="stat-card stat-card--muted">
            <span class="stat-bar"></span>
            <div class="stat-copy">
              <p>Create Admin</p>
              <img src="../ASSETS/circle.svg" alt="Create Admin">
            </div>
          </div>
          <div class="stat-card stat-card--bright">
            <span class="stat-bar"></span>
            <div class="stat-copy">
              <p>Total Admin <img src="../ASSETS/user.svg" alt="Total Admin"></p>
              <strong id="statTotalAdmins">0</strong>
            </div>
          </div>
        </section>

        <!-- Background Container — Create Admin panel -->
        <div class="bg-container">
          <div class="create-wrapper">

            <div class="fake-btn">Create Admin</div>

            <div class="create-panel">

              <!-- Header -->
              <div class="create-header">
                <span>Create Account</span>
                <span class="admin-id">New</span>
              </div>

              <!-- Body -->
              <div class="create-body">

                <!-- Left Form -->
                <div class="form-left">
                  <div class="row">
                    <div class="field-group">
                      <label>First Name</label>
                      <input class="first" type="text" placeholder="First Name">
                    </div>
                    <div class="field-group">
                      <label>Surname</label>
                      <input class="surname" type="text" placeholder="Last Name">
                    </div>
                    <div class="field-group field-group-mi">
                      <label>Middle Initial</label>
                      <input class="mi" type="text" placeholder="M" inputmode="text" autocomplete="off">
                    </div>
                  </div>

                  <div class="field-group">
                    <label>Email Address</label>
                    <input class="email" type="email" placeholder="example@gmail.com">
                  </div>

                  <div class="field-group">
                    <label>Password</label>
                    <input class="password" type="password" placeholder="Password">
                  </div>

                  <div class="field-group">
                    <label>ID Number</label>
                    <input class="idNumber" type="text" placeholder="000-000-000" inputmode="numeric" autocomplete="off">
                  </div>

                  <!-- Create Account + Cancel only — Back button moved to right-space -->
                  <div class="actions">
                    <button type="button" class="btn-create" id="createBtn" onclick="triggerSuccess()">Create Account</button>
                    <button type="button" class="btn-cancel-create" id="cancelBtn">Cancel</button>
                  </div>
                </div>

                <!-- Right Success State -->
                <div class="right-space">
                  <div class="success-content" id="successContent">
                    <div class="success-icon-wrap">
                      <img src="../ASSETS/check.svg" alt="Success">
                    </div>
                    <p class="success-label">Account Created!</p>
                    <!-- Back to Dashboard sits here — always below icon + label -->
                    <button type="button" class="btn-back" id="backBtn" style="display:none;" onclick="resetForm()">Back to Dashboard</button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
        <!-- end .bg-container -->

      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const miInput = document.querySelector('.form-left input.mi');
      const idInput = document.querySelector('.form-left input.idNumber');

      if (miInput) {
        miInput.addEventListener('input', function () {
          const cleaned = String(this.value || '')
            .replace(/[^a-zA-Z]/g, '')
            .slice(0, 1)
            .toUpperCase();
          this.value = cleaned;
        });
      }

      if (idInput) {
        idInput.addEventListener('keypress', function (e) {
          const allowed = /[\d-]/;
          if (!allowed.test(e.key) && e.key.length === 1) e.preventDefault();
        });
        idInput.addEventListener('input', function () {
          this.value = String(this.value || '').replace(/[^\d-]/g, '');
        });
      }

      const cancelBtn = document.getElementById('cancelBtn');
      if (cancelBtn) cancelBtn.addEventListener('click', resetForm);

      (async function loadAdminCount() {
        if (!window.CSMS || !window.CSMS.api || typeof window.CSMS.api.request !== 'function') return;
        const el = document.getElementById('statTotalAdmins');
        if (!el) return;
        try {
          const resp = await window.CSMS.api.request('/api/superadmin/admins?is_active=true&per_page=1', { method: 'GET' });
          const total = resp && resp.data && resp.data.pagination ? resp.data.pagination.total : null;
          if (typeof total === 'number') el.textContent = String(total);
        } catch {
          // Non-fatal.
        }
      })();
    });

    async function triggerSuccess() {
      const first = document.querySelector('.first');
      const surname = document.querySelector('.surname');
      const mi = document.querySelector('.mi');
      const emailInput = document.querySelector('input.email');
      const passwordInput = document.querySelector('input.password');
      const idInput = document.querySelector('input.idNumber');

      const inputs = [first, surname, emailInput, passwordInput, idInput].filter(Boolean);
      let allFilled = true;

      inputs.forEach(function (input) {
        if (!input.value.trim()) {
          allFilled = false;
          input.style.border = '1.5px solid red';
        } else {
          input.style.border = '1px solid #c8c8c8';
        }
      });

      if (emailInput && emailInput.value && !emailInput.value.includes('@')) {
        allFilled = false;
        emailInput.style.border = '1.5px solid red';
      }

      if (!allFilled) return;

      if (!window.CSMS || !window.CSMS.api || typeof window.CSMS.api.request !== 'function') {
        alert('App not initialized. Please refresh the page.');
        return;
      }

      const firstName = String(first.value || '').trim().replace(/\s+/g, ' ');
      const lastName = String(surname.value || '').trim().replace(/\s+/g, ' ');
      const miVal = mi && mi.value ? String(mi.value).replace(/[^a-zA-Z]/g, '').slice(0, 1).toUpperCase() : '';
      const fullName = [firstName, miVal ? `${miVal}.` : '', lastName].filter(Boolean).join(' ');

      const createBtn = document.getElementById('createBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      if (createBtn) createBtn.disabled = true;
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        const resp = await window.CSMS.api.request('/api/superadmin/admins', {
          method: 'POST',
          body: {
            name: fullName,
            email: (emailInput.value || '').trim().toLowerCase(),
            password: passwordInput.value,
          },
        });

        const created = resp && resp.data ? resp.data : null;
        const adminId = created && created.id ? created.id : null;
        const adminLabel = document.querySelector('.admin-id');
        if (adminLabel && adminId) adminLabel.textContent = adminId;

        document.getElementById('successContent').classList.add('visible');
        document.getElementById('createBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('backBtn').style.display = 'inline-block';
      } catch (e) {
        alert(e && e.message ? e.message : 'Failed to create admin account.');
      } finally {
        if (createBtn) createBtn.disabled = false;
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }

    function resetForm() {
      document.getElementById('successContent').classList.remove('visible');
      document.getElementById('createBtn').style.display = 'inline-block';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('backBtn').style.display   = 'none';

      document.querySelectorAll('.form-left input').forEach(input => {
        input.value = '';
        input.style.border = '1px solid #c8c8c8';
      });
    }
  </script>
</body>
</html>
