<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS Super Admin - Overall Users</title>
  <link rel="stylesheet" href="/static/css/superadmin/Super Admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    .panel-tools-inline {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .user-search {
      flex: 1;
      min-width: 220px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 8px 10px;
      border-radius: 12px;
      color: #fff;
    }
    .user-search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
    }
    .user-search input::placeholder { color: rgba(255,255,255,0.75); }

    .group-title {
      padding: 14px 6px 6px;
      font-weight: 900;
      color: #ffffff;
      opacity: 0.98;
      letter-spacing: 0.03em;
    }

    .subgroup-title {
      padding: 10px 6px 6px;
      font-weight: 900;
      color: rgba(255,255,255,0.92);
      opacity: 0.95;
      letter-spacing: 0.02em;
      font-size: 12px;
      text-transform: uppercase;
    }

    .details-kv {
      width: 100%;
      display: grid;
      gap: 10px;
      padding: 14px 12px;
    }

    .details-kv .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
    }

    .details-kv .k {
      font-weight: 900;
      color: #043AA3;
      font-size: 12px;
    }

    .details-kv .v {
      font-weight: 700;
      color: #1f2a44;
      font-size: 13px;
      word-break: break-word;
    }

    .details-empty {
      width: 100%;
      text-align: center;
      color: #6b7a99;
      padding: 20px 10px;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .bottom-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 650px) {
      .details-kv .row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <div class="menu">
      <input type="checkbox" id="menu"/>

      <div class="logo">
          CSMS
        <label for="menu"></label>
      </div>

        <div class="items">
          <a href="Super Admin.html" class="item"><img src="../ASSETS/home.jpg" alt="Home Icon" class="nav-icon">Home</a>
          <a href="aboutus.html" class="item"><img src="../ASSETS/info.jpg" alt="About Icon" class="nav-icon">About</a>
          <a href="/auth/homepage.html" class="item">Logout</a>
        </div>

    </div>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
              <a href="profile2.html">
                <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
              </a>
            <span>Profile</span>
          </div>

          <div class="sidebar-card sidebar-card--light">
                <i class="fa-solid fa-table-cells-large" style="font-size: 50px; color: white;"></i>
            <span>Dashboard</span>
          </div>

          <div class="sidebar-section" aria-label="Import navigation">
            <div class="sidebar-section-title">Import</div>
            <a class="sidebar-link" href="Imports.html#import-students">Import Students</a>
            <a class="sidebar-link" href="Imports.html#import-schedules">Import Schedules</a>
            <a class="sidebar-link" href="Schedules.html">View Schedules</a>
            <a class="sidebar-link sidebar-link--active" href="Users.html">View Overall Users</a>
          </div>
        </div>
        <a href="/auth/homepage.html">
        <button class="logout-btn" type="button">Log out</button>
        </a>
      </aside>

      <main class="content">
        <section class="title-row">
          <h1>Super Admin</h1>
          <div class="title-line"></div>
        </section>

        <section class="stats-row">
          <a href="Users.html">
            <div class="stat-card stat-card--bright">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Overall Users</p>
                <strong id="statOverallUsers">0</strong>
              </div>
            </div>
          </a>

          <a href="Super Admin.html">
            <div class="stat-card stat-card--muted">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Manage Admin</p>
                <img src="../ASSETS/cog.svg">
              </div>
            </div>
          </a>

          <a href="Schedules.html">
            <div class="stat-card stat-card--muted">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Schedules</p>
                <img src="../ASSETS/circle.svg">
              </div>
            </div>
          </a>

          <a href="Imports.html">
            <div class="stat-card stat-card--muted">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Imports</p>
                <img src="../ASSETS/circle.svg">
              </div>
            </div>
          </a>
        </section>

        <div class="bg-container">
          <div class="bottom-row">
            <div class="request-panel">
              <div class="panel-header">
                <span class="panel-title">View Overall Users</span>
                <div class="panel-tools-inline">
                  <label class="user-search" aria-label="Search users">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="userSearch" type="text" placeholder="Search name, email, ID, section">
                  </label>
                </div>
              </div>
              <div class="request-list" id="overallUserList"></div>
            </div>

            <div class="details-panel">
              <div class="details-header">
                <h2 style="margin:0;">User Details</h2>
              </div>
              <div class="details-body" style="display:block; width:100%;">
                <div class="details-empty" id="userDetailsEmpty">Select a user from the list.</div>
                <div class="details-kv" id="userDetails" style="display:none;"></div>
              </div>
            </div>
          </div>
        </div>

        <script src="/static/js/common/superadmin_overall_users.js"></script>
      </main>
    </div>
  </div>
</body>
</html>
