<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS Super Admin - Schedules</title>
  <link rel="stylesheet" href="Super Admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-top: 12px;
      align-items: end;
    }
    .filter-row label {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      display: block;
      margin-bottom: 6px;
    }
    .filter-row input, .filter-row select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
      color: #fff;
      outline: none;
    }
    .filter-row option { color: #101828; }
    .btn-create {
      background: #fff;
      color: #043AA3;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .sched-form {
      width: 100%;
      display: grid;
      gap: 12px;
    }
    .sched-form .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .sched-form label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: #043AA3;
      margin-bottom: 6px;
    }
    .sched-form input, .sched-form select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d0d5dd;
      outline: none;
      background: #fff;
    }
    .sched-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .btn-danger {
      background: #fff;
      color: #c0392b;
      border: 1.5px solid rgba(192,57,43,0.35);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
    }
    .details-body { align-items: stretch; justify-content: flex-start; }
    .details-empty {
      width: 100%;
      text-align: center;
      color: #6b7a99;
      padding: 20px 10px;
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .bottom-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 850px) {
      .filter-row { grid-template-columns: 1fr 1fr; }
      .sched-form .row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <div class="menu">
      <input type="checkbox" id="menu"/>

      <div class="logo">
          CSMS
        <label for="menu"></label>
      </div>

        <div class="items">
          <a href="Super Admin.html" class="item"><img src="ASSETS/home.jpg" alt="Home Icon" class="nav-icon">Home</a>
          <a href="aboutus.html" class="item"><img src="ASSETS/info.jpg" alt="Home Icon" class="nav-icon">About</a>
          <a href="homepage.html" class="item">Logout</a>
        </div>

    </div>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
              <a href="profile2.html">
                <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
              </a>
            <span>Profile</span>
          </div>

          <div class="sidebar-card sidebar-card--light">
                <i class="fa-solid fa-table-cells-large" style="font-size: 50px; color: white;"></i>
            <span>Dashboard</span>
          </div>
        </div>
        <a href="homepage.html">
        <button class="logout-btn" type="button">Log out</button>
        </a>
      </aside>

      <main class="content">
        <section class="title-row">
          <h1>Super Admin</h1>
          <div class="title-line"></div>
        </section>

        <section class="stats-row">
          <a href="Super Admin.html">
            <div class="stat-card stat-card--muted">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Manage Admin</p>
                <img src="ASSETS/cog.svg">
              </div>
            </div>
          </a>
          <a href="Imports.html">
            <div class="stat-card stat-card--muted">
              <span class="stat-bar"></span>
              <div class="stat-copy">
                <p>Import .xlsx</p>
                <img src="ASSETS/circle.svg">
              </div>
            </div>
          </a>
          <div class="stat-card stat-card--bright">
            <span class="stat-bar"></span>
            <div class="stat-copy">
              <p>Schedules</p>
              <strong id="statScheduleCount">0</strong>
            </div>
          </div>
        </section>

        <div class="bg-container">
          <div class="bottom-row">
            <div class="request-panel">
              <div class="panel-header">
                <span class="panel-title">Schedules</span>
                <div class="filter-row">
                  <div>
                    <label for="filterSection">Section</label>
                    <input id="filterSection" type="text" placeholder="BSIT 1-1">
                  </div>
                  <div>
                    <label for="filterDay">Day</label>
                    <select id="filterDay">
                      <option value="">All</option>
                      <option>Monday</option>
                      <option>Tuesday</option>
                      <option>Wednesday</option>
                      <option>Thursday</option>
                      <option>Friday</option>
                      <option>Saturday</option>
                      <option>Sunday</option>
                    </select>
                  </div>
                  <div>
                    <label for="filterSearch">Search</label>
                    <input id="filterSearch" type="text" placeholder="Room / Subject / Code">
                  </div>
                  <div>
                    <button class="btn-create" type="button" onclick="openCreateSchedule()">+ Create</button>
                  </div>
                </div>
              </div>

              <div class="request-list" id="scheduleList"></div>
            </div>

            <div class="details-panel">
              <div class="details-header">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                  <span style="font-weight:900; color:#043AA3;" id="schedPanelTitle">Schedule Details</span>
                  <span style="font-weight:800; color:#6b7a99;" id="schedLabel">—</span>
                </div>
              </div>
              <div class="details-body">
                <div class="details-empty" id="schedEmpty">Select a schedule from the list, or create a new schedule.</div>
                <form id="scheduleForm" class="sched-form" style="display:none;">
                  <input type="hidden" id="scheduleId" value="">

                  <div class="row">
                    <div>
                      <label for="schedSection">Section</label>
                      <input id="schedSection" type="text" placeholder="BSIT 1-1" required>
                    </div>
                    <div>
                      <label for="schedDay">Day</label>
                      <select id="schedDay" required>
                        <option>Monday</option>
                        <option>Tuesday</option>
                        <option>Wednesday</option>
                        <option>Thursday</option>
                        <option>Friday</option>
                        <option>Saturday</option>
                        <option>Sunday</option>
                      </select>
                    </div>
                  </div>

                  <div class="row">
                    <div>
                      <label for="schedRoom">Room</label>
                      <input id="schedRoom" type="text" placeholder="CAS-201" required>
                    </div>
                    <div>
                      <label for="schedSubjectCode">Subject Code (optional)</label>
                      <input id="schedSubjectCode" type="text" placeholder="CC3">
                    </div>
                  </div>

                  <div>
                    <label for="schedSubject">Subject (optional)</label>
                    <input id="schedSubject" type="text" placeholder="Intermediate Programming">
                  </div>

                  <div class="row">
                    <div>
                      <label for="schedStart">Start Time (HH:MM or H:MMAM)</label>
                      <input id="schedStart" type="text" placeholder="07:00" required>
                    </div>
                    <div>
                      <label for="schedEnd">End Time (HH:MM or H:MMPM)</label>
                      <input id="schedEnd" type="text" placeholder="10:30" required>
                    </div>
                  </div>

                  <div class="sched-actions">
                    <button class="btn-cancel" type="button" onclick="closeScheduleForm()">Cancel</button>
                    <button class="btn-danger" type="button" id="btnDeleteSchedule" onclick="deleteSelectedSchedule()" style="display:none;">Delete</button>
                    <button class="btn-save" type="submit" id="btnSaveSchedule">Save</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>

        <script src="/common/superadmin_schedules.js"></script>
      </main>
    </div>
  </div>
</body>
</html>
