<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-group">
        <div class="brand">CSMS</div>
        <div class="brand-divider" aria-hidden="true"></div>
      </div>

      <nav class="topnav" aria-label="Primary">
        <a class="nav-link active" href="/dashboard/admin.html"><span>Home</span></a>
        <a class="nav-link" href="/about us.html"><span>About us</span></a>
      </nav>
    </header>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card outline">
            <div class="sidebar-icon-wrap">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <circle cx="32" cy="22" r="10"></circle>
                <path d="M16 49c3.8-8.6 11.1-13 16-13s12.2 4.4 16 13"></path>
                <circle cx="32" cy="32" r="24"></circle>
              </svg>
            </div>
            <span>PROFILE</span>
          </div>

          <div class="sidebar-card selected">
            <div class="sidebar-icon-wrap">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <rect x="16" y="16" width="12" height="12" rx="3"></rect>
                <rect x="36" y="16" width="12" height="12" rx="3"></rect>
                <rect x="16" y="36" width="12" height="12" rx="3"></rect>
                <rect x="36" y="36" width="12" height="12" rx="3"></rect>
              </svg>
            </div>
            <span>Dashboard</span>
          </div>
        </div>

        <button class="logout-btn" type="button">Log out</button>
      </aside>

      <main class="content">
        <section class="title-row">
          <h1>Admin</h1>
          <div class="title-line" aria-hidden="true"></div>
        </section>

        <section class="stats-row">
          <a href="/PermissionReq.html">
            <article class="stat-card stat-card-muted">
              <span class="stat-bar" aria-hidden="true"></span>
              <div class="stat-copy">
                <p>Request Permission</p>
                <strong id="permissionRequestCount">0</strong>
              </div>
            </article>
          </a>

          <a href="/Reservation.html">
            <article class="stat-card stat-card-muted">
              <span class="stat-bar" aria-hidden="true"></span>
              <div class="stat-copy">
                <p>Reservation</p>
                <strong id="pendingReservationCount">0</strong>
              </div>
            </article>
          </a>

          <article class="stat-card stat-card-bright">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Total Room</p>
              <strong id="totalRoomCount">0</strong>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/admin-dashboard-load.js"></script>
</body>
</html>
