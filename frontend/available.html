<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS — Available Rooms</title>
  <link rel="stylesheet" href="/assets/css/available.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body data-room-view="available">
  <div class="page-shell">
    <div class="menu">
      <input type="checkbox" id="menu"/>

      <div class="logo">
        CSMS
        <label for="menu"></label>
      </div>

      <div class="items">
        <a href="/dashboard/student.html" class="item"><img src="/assets/img/home.png" alt="Home Icon" class="nav-icon">Home</a>
        <a href="/about us.html" class="item"><img src="/assets/img/info.png" alt="Info Icon" class="nav-icon">About</a>
      </div>
    </div>

    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-menu">
          <div class="sidebar-card sidebar-card--outline">
            <a href="/profile2.html">
              <i class="fa-regular fa-circle-user" style="font-size: 60px; color: #043AA3;"></i>
            </a>
            <span>Profile</span>
          </div>

          <div class="sidebar-card sidebar-card--light">
            <i class="fa-solid fa-table-cells-large" style="font-size: 40px; color: white;"></i>
            <span>Dashboard</span>
          </div>
        </div>
        <button class="logout-btn" type="button">Log out</button>
      </aside>

      <main class="content">
        <section class="title-row">
          <h1>Student View</h1>
          <div class="title-line" aria-hidden="true"></div>
        </section>

        <section class="stats-row">
          <a href="/occupied.html">
            <article class="stat-card stat-card-muted">
              <span class="stat-bar" aria-hidden="true"></span>
              <div class="stat-copy">
                <p>Occupied</p>
                <strong id="occupiedCount">0</strong>
              </div>
            </article>
          </a>

          <article class="stat-card">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Available Room</p>
              <strong id="availableCount">0</strong>
            </div>
          </article>

          <article class="stat-card stat-card-bright">
            <span class="stat-bar" aria-hidden="true"></span>
            <div class="stat-copy">
              <p>Total Room</p>
              <strong id="totalCount">0</strong>
            </div>
          </article>
        </section>

        <div class="panel">
          <div class="panel-top">
            <div class="panel-badge">Available Room</div>

            <div class="panel-tools">
              <label class="search-box">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="6.5"></circle>
                  <path d="m16 16 4 4"></path>
                </svg>
                <input type="text" placeholder="Search Building">
              </label>

              <div class="calendar-wrapper">
                <button id="toggleCalendar">Select Date ▼</button>
                <div id="calendarContainer" style="display: none;">
                  <div class="calendar">
                    <div class="header">
                      <div id="prev" class="btn"><i class="fa-solid fa-arrow-left"></i></div>
                      <div id="month-year"></div>
                      <div id="next" class="btn"><i class="fa-solid fa-arrow-right"></i></div>
                    </div>

                    <div class="weekdays">
                      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
                      <div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                    <div class="days" id="days"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="table-shell">
            <div class="table-head">
              <span>Date</span>
              <span>Building</span>
              <span>Floor</span>
              <span>Room</span>
              <span>TIME</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/availability-load.js"></script>
  <script src="/assets/js/calendar-table.js"></script>
</body>
</html>
