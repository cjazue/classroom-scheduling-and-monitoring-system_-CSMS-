<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLV CSMS - Login</title>

    <link rel="stylesheet" href="/assets/css/loginpage.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      .form-error {
        display: none;
        background: #fee2e2;
        color: #991b1b;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 12px;
        line-height: 1.35;
      }
    </style>
  </head>

  <body>
    <div class="menu">
      <div class="logo">CSMS</div>
    </div>

    <div class="container">
      <div class="left">
        <img src="/assets/img/plv maysan 1.png" alt="PLV Building" />
      </div>

      <div class="right">
        <div class="form-box">
          <div id="loginSection">
            <h1>Welcome Back</h1>
            <p>Please log in to your account</p>

            <div id="loginError" class="form-error" role="alert" aria-live="polite"></div>

            <form id="loginForm" onsubmit="return false;" autocomplete="on" novalidate>
              <label for="loginEmail">Email</label>
              <input
                type="email"
                id="loginEmail"
                name="email"
                autocomplete="username"
                placeholder="you@example.com"
                required
              />

              <div class="password-label">
                <label for="loginPassword" style="margin: 0">Password</label>
              </div>
              <input
                type="password"
                id="loginPassword"
                name="password"
                autocomplete="current-password"
                placeholder="********"
                required
              />

              <label class="show-pass" for="togglePassword">
                <input type="checkbox" id="togglePassword" />
                <span>Show password</span>
              </label>

              <button type="submit" class="submit-btn" id="loginBtn">Log In</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
  </body>
</html>
